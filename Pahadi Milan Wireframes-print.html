<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pahadi Milan — Wireframes (Print)</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #E8E3DC;
    font-family: 'Kalam', cursive;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ── Screen layout ── */
  .page {
    width: 297mm;
    min-height: 210mm;
    height: 210mm;
    background: #FAF7F2;
    margin: 12px auto;
    padding: 18px 22px 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }

  .page-cover {
    justify-content: center;
    align-items: center;
    background: #FAF7F2;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid #E4DDD0;
    flex-shrink: 0;
  }

  .section-num {
    font-size: 11px;
    color: #B8882A;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-title {
    font-size: 17px;
    font-weight: 700;
    color: #1A1010;
  }

  .section-sub {
    font-size: 11px;
    color: #999;
    margin-left: auto;
  }

  .phones-row {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 28px;
  }

  /* Each phone is 390×844 scaled to fit */
  .phone-slot {
    flex-shrink: 0;
    position: relative;
  }

  .phone-label {
    text-align: center;
    font-size: 10px;
    color: #888;
    margin-bottom: 5px;
    font-family: 'Kalam', cursive;
    letter-spacing: 0.3px;
  }

  .phone-scaler {
    transform-origin: top left;
  }

  /* ── Print ── */
  @media print {
    @page { size: A4 landscape; margin: 1.2cm; }
    body { background: white; }
    .page {
      margin: 0;
      box-shadow: none;
      page-break-after: always;
      break-after: page;
      width: 100%;
      height: 100%;
      padding: 14px 18px 10px;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">

// ─── Tokens ───────────────────────────────────────────────
const M  = '#7B1F2A';
const G  = '#B8882A';
const BG = '#FAF7F2';
const LG = '#E4DDD0';
const GR = '#999';
const K  = 'Kalam, cursive';

// ─── Primitives ───────────────────────────────────────────
const Ph = ({h=100, label='photo', r=8, w='100%', style={}}) => (
  <div style={{height:h, width:w, borderRadius:r, flexShrink:0,
    background:'repeating-linear-gradient(45deg,#EDE8DF,#EDE8DF 4px,#E2DDD5 4px,#E2DDD5 8px)',
    border:`1.5px dashed #BBB`, display:'flex', alignItems:'center',
    justifyContent:'center', position:'relative', overflow:'hidden', ...style}}>
    <span style={{fontFamily:K, fontSize:10, color:'#999', background:'rgba(255,255,255,0.75)',
      padding:'2px 6px', borderRadius:3}}>{label}</span>
  </div>
);

const Btn = ({label, primary, ghost, full, sm, style={}}) => (
  <div style={{
    height:sm?38:50, borderRadius:sm?19:25,
    background: primary ? M : ghost ? 'transparent' : '#EDE8DF',
    border: ghost ? `1.5px solid #BBB` : 'none',
    display:'flex', alignItems:'center', justifyContent:'center',
    padding:'0 22px', width:full?'100%':'auto', flexShrink:0, ...style}}>
    <span style={{fontFamily:K, fontSize:sm?12:14, fontWeight:primary?700:400,
      color:primary?'#fff':ghost?'#666':'#444'}}>{label}</span>
  </div>
);

const Inp = ({label, val, sm, icon}) => (
  <div style={{height:sm?42:52, borderRadius:12, border:`1.5px solid ${LG}`,
    background:'#fff', display:'flex', alignItems:'center',
    padding:'0 14px', marginBottom:8, gap:10}}>
    {icon && <div style={{width:18,height:18,borderRadius:9,background:LG,flexShrink:0}}/>}
    <span style={{fontFamily:K, fontSize:sm?12:14, color:val?'#333':'#BBB'}}>{val||label}</span>
  </div>
);

const Tag = ({label, active, gold, sm}) => (
  <div style={{display:'inline-flex', alignItems:'center', height:sm?24:28, borderRadius:14,
    padding:`0 ${sm?8:12}px`, marginRight:5, marginBottom:5,
    background: active ? M+'22' : gold ? G+'18' : '#F0EAE0',
    border:`1px solid ${active?M+'50':gold?G+'40':LG}`}}>
    <span style={{fontFamily:K, fontSize:sm?10:11.5, color:active?M:gold?G:'#666'}}>{label}</span>
  </div>
);

const H1 = ({t, size=22, c='#1A1010', mb=6}) =>
  <div style={{fontFamily:K, fontSize:size, fontWeight:700, color:c, marginBottom:mb, lineHeight:1.2}}>{t}</div>;

const P = ({t, size=13, c='#666', mb=8}) =>
  <div style={{fontFamily:K, fontSize:size, color:c, marginBottom:mb, lineHeight:1.5}}>{t}</div>;

const Lbl = ({t, mb=4}) =>
  <div style={{fontFamily:K, fontSize:10, color:'#999', marginBottom:mb, letterSpacing:0.8, textTransform:'uppercase'}}>{t}</div>;

const Sep = ({my=14}) => <div style={{height:1, background:LG, margin:`${my}px 0`}}/>;

const Progress = ({pct}) => (
  <div>
    <div style={{display:'flex', justifyContent:'space-between', marginBottom:5}}>
      <span style={{fontFamily:K, fontSize:11, color:'#888'}}>Profile completion</span>
      <span style={{fontFamily:K, fontSize:11, color:M, fontWeight:700}}>{pct}%</span>
    </div>
    <div style={{height:5, borderRadius:3, background:LG}}>
      <div style={{height:5, borderRadius:3, background:M, width:`${pct}%`}}/>
    </div>
  </div>
);

const StepProgress = ({step, total}) => (
  <div style={{display:'flex', gap:4, marginBottom:20}}>
    {Array.from({length:total}).map((_,i)=>(
      <div key={i} style={{flex:1, height:3, borderRadius:2,
        background: i<step ? M : i===step ? G : LG}}/>
    ))}
  </div>
);

const BottomNav = ({active=0}) => (
  <div style={{display:'flex', borderTop:`1px solid ${LG}`, padding:'10px 0 20px', background:'rgba(255,255,255,0.97)'}}>
    {[['⌂','Discover'],['♡','Matches'],['✉','Messages'],['◉','Profile']].map(([ic,lbl],i)=>(
      <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
        <span style={{fontSize:16, opacity:i===active?1:0.35}}>{ic}</span>
        <span style={{fontFamily:K, fontSize:9.5, color:i===active?M:GR}}>{lbl}</span>
        {i===active&&<div style={{width:14,height:2,borderRadius:1,background:M,marginTop:1}}/>}
      </div>
    ))}
  </div>
);

const TrustBadge = ({level='Medium'}) => (
  <div style={{display:'inline-flex', alignItems:'center', gap:4, height:20, borderRadius:10,
    padding:'0 8px', background:G+'22', border:`1px solid ${G}50`}}>
    <div style={{width:5,height:5,borderRadius:3,background:G}}/>
    <span style={{fontFamily:K, fontSize:9.5, color:G, fontWeight:700}}>{level} Trust</span>
  </div>
);

const ScorePill = ({score, size=38}) => (
  <div style={{width:size, height:size, borderRadius:size/2, background:M,
    display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
    <span style={{fontFamily:K, fontSize:size*0.28, fontWeight:700, color:'#fff'}}>{score}%</span>
  </div>
);

const Wrap = ({children, bg=BG, pt=70, pb=0, px=20}) => (
  <div style={{height:'100%', background:bg, overflow:'hidden',
    paddingTop:pt, paddingBottom:pb, paddingLeft:px, paddingRight:px,
    display:'flex', flexDirection:'column'}}>
    {children}
  </div>
);

const Nudge = ({text}) => (
  <div style={{borderRadius:10, background:M+'12', border:`1px dashed ${M}40`,
    padding:'10px 14px', marginBottom:14, display:'flex', gap:8, alignItems:'flex-start'}}>
    <span style={{fontSize:14}}>✨</span>
    <span style={{fontFamily:K, fontSize:12, color:M, lineHeight:1.4}}>{text}</span>
  </div>
);

const MatchRow = ({name, age, score, msg, trust='Medium'}) => (
  <div style={{display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:`1px solid ${LG}`}}>
    <div style={{position:'relative', flexShrink:0}}>
      <Ph h={48} w={48} label='' r={24}/>
      <div style={{position:'absolute', bottom:-1, right:-1}}><ScorePill score={score} size={20}/></div>
    </div>
    <div style={{flex:1, minWidth:0}}>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom:2}}>
        <span style={{fontFamily:K, fontSize:14, fontWeight:700, color:'#222'}}>{name}, {age}</span>
        <TrustBadge level={trust}/>
      </div>
      <span style={{fontFamily:K, fontSize:12, color:GR, display:'block',
        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{msg}</span>
    </div>
  </div>
);

// ─── Screen Components ────────────────────────────────────

const AuthOTP = () => (
  <Wrap pt={80} pb={40}>
    <div style={{textAlign:'center', marginBottom:36}}>
      <div style={{width:56,height:56,borderRadius:16,background:M,
        margin:'0 auto 14px',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:K,fontSize:24,color:'#fff',fontWeight:700}}>ॐ</span>
      </div>
      <H1 t="Pahadi Milan" size={26}/>
      <P t="Matrimony rooted in the hills" size={13} c={GR} mb={0}/>
    </div>
    <div style={{flex:1}}/>
    <H1 t="Welcome back" size={20} mb={6}/>
    <P t="Enter your phone number to continue" size={13}/>
    <Inp label="+91  Phone number"/>
    <Btn label="Send OTP →" primary full style={{marginTop:4}}/>
    <div style={{display:'flex',alignItems:'center',gap:10,margin:'18px 0'}}>
      <div style={{flex:1,height:1,background:LG}}/>
      <span style={{fontFamily:K,fontSize:11,color:GR}}>or continue with</span>
      <div style={{flex:1,height:1,background:LG}}/>
    </div>
    <div style={{display:'flex',gap:10}}>
      <Btn label="🍏  Apple" ghost full style={{flex:1}}/>
      <Btn label="G  Google" ghost full style={{flex:1}}/>
    </div>
    <P t="New here? Create your profile →" size={12} c={M} mb={0} style={{marginTop:18,textAlign:'center'}}/>
    <div style={{flex:1}}/>
  </Wrap>
);

const AuthSocial = () => (
  <div style={{height:'100%',position:'relative',overflow:'hidden'}}>
    <Ph h='65%' label="mountains + couple (hero illustration)" r={0}
      style={{position:'absolute',top:0,left:0,right:0,width:'100%',height:'65%'}}/>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'65%',
      background:'linear-gradient(to bottom, transparent 40%, rgba(10,5,3,0.85))'}}>
      <div style={{position:'absolute',bottom:24,left:20,right:20}}>
        <div style={{fontFamily:K,fontSize:13,color:'rgba(255,255,255,0.7)',
          background:G+'30',display:'inline-block',padding:'3px 10px',borderRadius:10,
          border:`1px solid ${G}50`,marginBottom:10}}>पहाड़ी मिलन</div>
        <H1 t="Find your person, from the hills" size={22} c='#fff' mb={6}/>
        <P t="Culturally rooted. Seriously intentional." size={13} c='rgba(255,255,255,0.75)' mb={0}/>
      </div>
    </div>
    <div style={{position:'absolute',bottom:0,left:0,right:0,
      background:BG,borderRadius:'24px 24px 0 0',padding:'24px 20px 40px'}}>
      <Btn label="Continue with Apple" primary full style={{marginBottom:10}}/>
      <Btn label="Continue with Google" full style={{marginBottom:10,background:'#fff',border:`1.5px solid ${LG}`}}/>
      <Btn label="Use phone number" ghost full/>
      <P t="By continuing, you agree to our Terms & Privacy Policy" size={10} c={GR} mb={0}
        style={{marginTop:14,textAlign:'center'}}/>
    </div>
  </div>
);

const OnboardStep1 = () => (
  <Wrap pt={72} pb={20}>
    <StepProgress step={0} total={5}/>
    <H1 t="Let's start with the basics" size={20} mb={6}/>
    <P t="We'll use this to find the right match for you." size={12}/>
    <div style={{marginTop:8}}>
      <Lbl t="Your full name" mb={6}/>
      <Inp label="e.g. Priya Rawat"/>
      <Lbl t="I am" mb={6}/>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {['Woman','Man','Other'].map(l=><Tag key={l} label={l} active={l==='Woman'}/>)}
      </div>
      <Lbl t="Date of birth" mb={6}/>
      <Inp label="DD / MM / YYYY"/>
      <Lbl t="This profile is for" mb={6}/>
      <div style={{display:'flex',flexWrap:'wrap'}}>
        {['Myself','My son','My daughter','My sibling'].map(l=>
          <Tag key={l} label={l} active={l==='Myself'}/>)}
      </div>
    </div>
    <div style={{flex:1}}/>
    <Nudge text="Start with the basics — you can add more details later to get better matches."/>
    <Btn label="Continue →" primary full/>
  </Wrap>
);

const OnboardStep2 = () => (
  <Wrap pt={72} pb={20}>
    <StepProgress step={1} total={5}/>
    <H1 t="Your Pahadi roots" size={20} mb={6}/>
    <P t="This helps find culturally compatible matches." size={12}/>
    <div style={{marginTop:8}}>
      <Lbl t="Home district (Uttarakhand)" mb={6}/>
      <Inp label="e.g. Almora, Pithoragarh…" icon/>
      <Lbl t="Mother tongue" mb={6}/>
      <div style={{display:'flex',flexWrap:'wrap',marginBottom:10}}>
        {['Kumaoni','Garhwali','Hindi','Jaunsari'].map(l=><Tag key={l} label={l} active={l==='Kumaoni'}/>)}
      </div>
      <Lbl t="Religion & community" mb={6}/>
      <Inp label="Hindu — General"/>
      <Lbl t="Current location" mb={6}/>
      <Inp label="City, State" icon/>
      <Lbl t="Open to relocation?" mb={6}/>
      <div style={{display:'flex',gap:8}}>
        {['Yes','No','Maybe'].map(l=><Tag key={l} label={l} active={l==='Yes'}/>)}
      </div>
    </div>
    <div style={{flex:1}}/>
    <Btn label="Continue →" primary full style={{marginTop:14}}/>
  </Wrap>
);

const OnboardNudge = () => (
  <Wrap pt={72} pb={20}>
    <StepProgress step={3} total={5}/>
    <div style={{textAlign:'center',padding:'16px 0 24px'}}>
      <div style={{width:72,height:72,borderRadius:36,background:M+'15',
        display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
        <span style={{fontSize:28}}>🏔️</span>
      </div>
      <H1 t="You're doing great!" size={20} mb={6}/>
      <P t="Your profile is 60% complete. A complete profile gets 3× more connection requests." size={13} c='#555'/>
    </div>
    <Progress pct={60}/>
    <div style={{marginTop:20}}>
      {[{label:'Add photos',sub:'0 of 3 added',done:false},
        {label:'Education & profession',sub:'Incomplete',done:false},
        {label:'Basic info',sub:'Complete ✓',done:true},
        {label:'Pahadi roots',sub:'Complete ✓',done:true}].map((item,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12,
          padding:'11px 14px',borderRadius:12,
          background:item.done?M+'08':'#fff',marginBottom:8,
          border:`1px solid ${item.done?M+'20':LG}`}}>
          <div style={{width:20,height:20,borderRadius:10,flexShrink:0,
            background:item.done?M:LG,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {item.done&&<span style={{fontSize:10,color:'#fff'}}>✓</span>}
          </div>
          <div style={{flex:1}}>
            <span style={{fontFamily:K,fontSize:13,color:item.done?M:'#333',fontWeight:700,display:'block'}}>{item.label}</span>
            <span style={{fontFamily:K,fontSize:11,color:GR}}>{item.sub}</span>
          </div>
          {!item.done&&<span style={{fontFamily:K,fontSize:11,color:M}}>Add →</span>}
        </div>
      ))}
    </div>
    <div style={{flex:1}}/>
    <Btn label="Complete profile now" primary full style={{marginTop:8}}/>
  </Wrap>
);

const DiscoverCard = () => (
  <div style={{height:'100%',background:'#F4EFE8',display:'flex',flexDirection:'column'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'72px 18px 12px'}}>
      <H1 t="Discover" size={22} mb={0}/>
      <div style={{width:36,height:36,borderRadius:18,background:'#fff',
        display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 1px 4px rgba(0,0,0,0.1)'}}>
        <span style={{fontSize:14}}>⚙</span>
      </div>
    </div>
    <div style={{flex:1,padding:'4px 16px 0',position:'relative'}}>
      <div style={{position:'absolute',top:12,left:24,right:24,bottom:80,
        background:'#fff',borderRadius:24,transform:'rotate(3deg)',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}/>
      <div style={{position:'relative',borderRadius:24,overflow:'hidden',
        height:'calc(100% - 80px)',boxShadow:'0 4px 20px rgba(0,0,0,0.12)'}}>
        <Ph h='100%' label="profile photo" r={0} style={{position:'absolute',inset:0,height:'100%'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top, rgba(10,4,2,0.9) 40%, transparent 70%)'}}/>
        <div style={{position:'absolute',top:14,right:14}}><TrustBadge level="Verified"/></div>
        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'16px 18px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:6}}>
            <div>
              <H1 t="Anjali, 27" size={20} c='#fff' mb={2}/>
              <P t="Almora · Software Engineer" size={12} c='rgba(255,255,255,0.8)' mb={4}/>
              <div><Tag label="Kumaoni" sm/><Tag label="Almora" sm/></div>
            </div>
            <ScorePill score={87}/>
          </div>
          <div style={{background:'rgba(255,255,255,0.12)',borderRadius:10,padding:'8px 12px',marginTop:6}}>
            <span style={{fontFamily:K,fontSize:11,color:'rgba(255,255,255,0.9)'}}>💡 Why this match? Both from Kumaoni families</span>
          </div>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:14,paddingTop:14,paddingBottom:10}}>
        <div style={{width:52,height:52,borderRadius:26,background:'#fff',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 8px rgba(0,0,0,0.10)',border:`1.5px solid ${LG}`}}>
          <span style={{fontSize:20}}>✕</span>
        </div>
        <div style={{width:42,height:42,borderRadius:21,background:G+'22',marginTop:5,
          display:'flex',alignItems:'center',justifyContent:'center',border:`1.5px solid ${G}50`}}>
          <span style={{fontSize:16}}>⭐</span>
        </div>
        <div style={{width:52,height:52,borderRadius:26,background:M,
          display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 2px 12px ${M}50`}}>
          <span style={{fontSize:20,color:'#fff'}}>♡</span>
        </div>
      </div>
    </div>
    <BottomNav active={0}/>
  </div>
);

const DiscoverFeed = () => (
  <div style={{height:'100%',display:'flex',flexDirection:'column',background:BG}}>
    <div style={{padding:'72px 18px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <H1 t="For you" size={22} mb={0}/>
      <Btn label="Filters" sm ghost style={{height:32}}/>
    </div>
    <div style={{overflow:'hidden',flex:1,padding:'0 18px 10px'}}>
      <Lbl t="Today's curated picks · 4 new" mb={8}/>
      <div style={{borderRadius:18,overflow:'hidden',background:'#fff',marginBottom:12,boxShadow:'0 2px 10px rgba(0,0,0,0.07)'}}>
        <Ph h={160} label="Priya, 29 · Pithoragarh" r={0}/>
        <div style={{padding:'12px 14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <div><H1 t="Priya Bisht, 29" size={15} mb={1}/>
              <P t="Pithoragarh · Teacher" size={12} c={GR} mb={4}/></div>
            <ScorePill score={91} size={36}/>
          </div>
          <div style={{marginBottom:8}}><Tag label="Garhwali" sm/><Tag label="Kumaon" sm/><TrustBadge level="Verified"/></div>
          <div style={{display:'flex',gap:8}}>
            <Btn label="♡  Like" primary sm style={{flex:1}}/>
            <Btn label="Skip" sm ghost style={{flex:1}}/>
          </div>
        </div>
      </div>
      <Lbl t="New in your area" mb={8}/>
      <div style={{display:'flex',gap:10}}>
        {['Meena, 26','Kavita, 30'].map(n=>(
          <div key={n} style={{flex:1,borderRadius:16,overflow:'hidden',background:'#fff',boxShadow:'0 2px 6px rgba(0,0,0,0.06)'}}>
            <Ph h={100} label={n} r={0}/>
            <div style={{padding:'8px 10px'}}>
              <span style={{fontFamily:K,fontSize:12,fontWeight:700,color:'#222',display:'block'}}>{n}</span>
              <span style={{fontFamily:K,fontSize:10.5,color:GR}}>Dehradun</span>
            </div>
          </div>
        ))}
      </div>
    </div>
    <BottomNav active={0}/>
  </div>
);

// ─── Phone wrapper with scale ─────────────────────────────
// A4 landscape usable height: ~680px. Phones are 844px tall.
// Scale = 0.72 fits 3 phones per row comfortably.
const SCALE = 0.72;
const PH = 844, PW = 390;

const Phone = ({label, children}) => (
  <div className="phone-slot">
    <div className="phone-label">{label}</div>
    <div style={{
      width: PW * SCALE,
      height: PH * SCALE,
      overflow: 'hidden',
      borderRadius: 48 * SCALE,
      flexShrink: 0,
    }}>
      <div className="phone-scaler" style={{transform:`scale(${SCALE})`, width:PW, height:PH}}>
        <IOSDevice width={PW} height={PH}>{children}</IOSDevice>
      </div>
    </div>
  </div>
);

                <div style={{fontFamily:K,fontSize:11,color:GR}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:28, display:'flex', gap:8, justifyContent:'center', flexWrap:'wrap'}}>
            {['Auth & Onboarding','Discover (3 directions)','Profile Detail','Like / Interactions','Matches & Chat','Verification','Safety & Reporting'].map(s=>(
              <div key={s} style={{padding:'4px 12px',borderRadius:12,background:'#F0EAE0',
                border:`1px solid ${LG}`}}>
                <span style={{fontFamily:K,fontSize:11,color:'#555'}}>{s}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Section Pages */}
      {sections.map(sec=>(
        <div key={sec.num} className="page">
          <div className="section-header">
            <span className="section-num">{sec.num}</span>
            <span className="section-title">{sec.title}</span>
            <span className="section-sub">{sec.sub}</span>
          </div>
          <div className="phones-row">
            {sec.phones.map(p=>(
              <Phone key={p.label} label={p.label}>{p.content}</Phone>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp/>);

// Auto-print after fonts + React settle
const tryPrint = () => {
  document.fonts.ready.then(() => {
    setTimeout(() => window.print(), 500);
  });
};
</script>
<script type="text/babel">
tryPrint();
</script>
</body>
</html>
